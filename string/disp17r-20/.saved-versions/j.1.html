<body>

<h1>M</h1>

<script>
function ImageExist(url) 
{
   var img = new Image();
   img.src = url;
   return img.height != 0;
}

for (i=1; i<100; i++){
   fname="strings-"+("00000" + i).substr(-5,5)+".png";
   if (ImageExist(fname)){
     document.write("<img src='"+fname+"'>");
   }
 }
</script>

</body>
